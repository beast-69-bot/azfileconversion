<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}AZ Stream{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css" />
    {% block head %}{% endblock %}
</head>
<body{% block body_attrs %}{% endblock %}>
    <div class="container">
        <header class="site-header">
            <a href="/" class="brand">
                <span class="brand-name">AZ Stream</span>
                <span class="holi-chip">🎨 Holi</span>
            </a>
            {% block header_extra %}{% endblock %}
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer class="site-footer">
            Powered by AZ Stream &middot; Built with ❤️
        </footer>
    </div>
    </body>

</html>
