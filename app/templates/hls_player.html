<!-- Banner Ad Container -->

    <script>
      atOptions = {
        'key' : '42a27b95e3a9b56ead80e085e7995838',

<!-- Fluid Player JS & Hls.js -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const originalUrl = "{{ stream_url }}";
        if (!originalUrl) {
            alert('Error: No stream URL provided!');
            return;
        }

        const sourceUrl = '/proxy?url=' + encodeURIComponent(originalUrl);
        
        // Add the source dynamically
        const videoElement = document.getElementById('player');
        const sourceElement = document.createElement('source');
        sourceElement.src = sourceUrl;
        sourceElement.type = 'application/x-mpegURL';
        videoElement.appendChild(sourceElement);

        fluidPlayer(
            'player',
            {
                layoutControls: {
                    primaryColor: "#8a2be2",
                    posterImage: "",
                    playButtonShowing: true,
                    fillToContainer: true
                },
                vastOptions: {
                    allowVPAID: true,
                    adList: [
                        {
                            roll: 'preRoll', // Shows ad before video starts
                            vastTag: 'https://s.magsrv.com/v1/vast.php?idz=5972662',
                            adText: 'Video will resume in...'
                        }
                    ]
                }
            }
        );
    });
</script>
