{% extends "base.html" %}

{% block title %}Section: {{ section_id }}{% endblock %}

{% block content %}
<div class="picker-wrap">
    <div class="card picker-card animate-in">
        <h2>Section: {{ section_id }}</h2>
        <p style="color: var(--muted); font-size: 14px; margin-top: 8px;">Select access type</p>
        <div class="picker-actions">
            <a class="btn btn-primary" href="/section/{{ section_id }}?access=normal">Normal</a>
            <a class="btn btn-secondary" href="/section/{{ section_id }}/premium">Premium</a>
        </div>
    </div>
</div>
{% endblock %}
