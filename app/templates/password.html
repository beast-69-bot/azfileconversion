{% extends "base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="centered-wrap">
    <div class="password-shell">
        <section class="card hero-panel password-card animate-in">
            <div class="eyebrow">Protected route</div>
            <h1>{{ heading }}</h1>
            <p class="lede">{{ subtext }}</p>
        </section>

        <section class="panel password-card animate-in">
            <div class="password-kicker">Authentication</div>
            <form method="post" action="{{ form_action }}" class="password-form">
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Enter password" required autocomplete="current-password" />
                </div>
                <button type="submit" class="btn btn-primary">{{ button_text }}</button>
            </form>
            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}
        </section>
    </div>
</div>
{% endblock %}
