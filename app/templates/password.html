{% extends "base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="centered-wrap">
    <div class="card password-card animate-in">
        <div class="lock-icon">🔒</div>
        <h2>{{ heading }}</h2>
        <p>{{ subtext }}</p>
        <form method="post" action="{{ form_action }}" class="password-form">
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Enter password"
                    required autocomplete="current-password" />
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">{{ button_text }}</button>
        </form>
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
    </div>
</div>
{% endblock %}
